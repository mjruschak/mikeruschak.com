<header>
    <div class="inner-header">
        <div>
            <h1 id="brand"><a class='{{ if eq .RelPermalink ("/" | relURL) }}is-active{{ end }}' href='{{ "/" | relURL }}'>{{.Site.Params.Author}}</a></h1>
        </div>
        <div>
            <nav>
                <ul role="navigation">
                    <li><a class='{{ if hasPrefix .RelPermalink ("resume" | relURL) }}is-active{{ end }}' href='{{ "resume" | relURL }}'>Resume</a></li>
                    <li><a class='{{ if hasPrefix .RelPermalink ("projects" | relURL) }}is-active{{ end }}' href='{{ "projects" | relURL }}'>Projects</a></li>
                </ul>
            </nav>
        </div>
    </div>
    <hr>
</header>
